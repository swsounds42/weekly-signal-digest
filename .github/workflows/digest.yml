name: weekly-digest

on:
  schedule:
    # Every Monday at 8:00 UTC. Edit to whatever fits your team.
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run digest
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m signal_digest.cli \
            --identities fixtures/identities.yaml \
            --since 7d \
            --delivery ${{ vars.DIGEST_DELIVERY || 'stdout' }}
